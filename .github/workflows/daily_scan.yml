name: Dagelijkse Vastgoed Scan

on:
  schedule:
    - cron: "0 7 * * *"   # Elke dag om 07:00 UTC (09:00 NL zomertijd)
  workflow_dispatch:       # Handmatig triggeren via GitHub UI

jobs:
  scan:
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installeer dependencies
        run: pip install -r requirements.txt

      - name: Installeer Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scanner.py

      - name: Upload database als artifact
        uses: actions/upload-artifact@v4
        with:
          name: panden-database
          path: panden.db
          retention-days: 30

      - name: Commit leads.json naar data branch
        if: always()
        run: |
          if [ -f leads.json ]; then
            git config user.name "github-actions"
            git config user.email "actions@github.com"
            git fetch origin data || git checkout --orphan data
            git checkout data 2>/dev/null || git checkout -b data
            git rm -rf . 2>/dev/null || true
            git checkout main -- leads.json
            git add leads.json
            git commit -m "Update leads $(date -u +%Y-%m-%dT%H:%M:%SZ)" || echo "No changes"
            git push origin data --force
          fi
