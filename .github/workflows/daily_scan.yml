name: Dagelijkse Vastgoed Scan

on:
  schedule:
    - cron: "0 7 * * *"   # Elke dag om 07:00 UTC (09:00 NL zomertijd)
  workflow_dispatch:       # Handmatig triggeren via GitHub UI

jobs:
  scan:
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Python setup
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installeer dependencies
        run: pip install -r requirements.txt

      - name: Installeer Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scanner.py

      - name: Upload database als artifact
        uses: actions/upload-artifact@v4
        with:
          name: panden-database
          path: panden.db
          retention-days: 30
